<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Task Tracker</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

.form{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr auto;
gap:10px;
margin-bottom:20px;
}

.form input,
.form select{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.addBtn{
background:#3498db;
color:white;
}

.search{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

.progressBox{
margin:20px 0;
}

.progress{
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#27ae60;
text-align:center;
color:white;
font-weight:bold;
line-height:25px;
transition:.4s;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#34495e;
color:white;
}

.priority-high{
color:red;
font-weight:bold;
}

.priority-medium{
color:orange;
font-weight:bold;
}

.priority-low{
color:green;
font-weight:bold;
}

.status-completed{
color:green;
font-weight:bold;
}

.status-progress{
color:orange;
font-weight:bold;
}

.status-pending{
color:red;
font-weight:bold;
}

.edit{
background:#f39c12;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

@media(max-width:900px){

.form{
grid-template-columns:1fr;
}

table{
font-size:13px;
}

}
</style>

</head>
<body>

<div class="container">

<h1>📋 Project Task Tracker</h1>

<div class="form">

<input id="task" placeholder="Task Name">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<input type="date" id="date">

<button class="addBtn" onclick="saveTask()">Add</button>

</div>

<input
class="search"
placeholder="Search task..."
onkeyup="searchTask(this.value)"
>

<div class="progressBox">

<h3>Project Progress</h3>

<div class="progress">

<div class="bar" id="bar">0%</div>

</div>

</div>

<table>

<thead>

<tr>

<th>Task</th>

<th>Priority</th>

<th>Status</th>

<th>Due Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let editIndex=-1;

function saveStorage(){

localStorage.setItem("tasks",JSON.stringify(tasks));

}

function saveTask(){

let task=document.getElementById("task").value.trim();

let priority=document.getElementById("priority").value;

let status=document.getElementById("status").value;

let date=document.getElementById("date").value;

if(task==""){

alert("Enter task");

return;

}

let obj={task,priority,status,date};

if(editIndex==-1){

tasks.push(obj);

}else{

tasks[editIndex]=obj;

editIndex=-1;

}

saveStorage();

clearForm();

display(tasks);

}

function clearForm(){

task.value="";

priority.value="High";

status.value="Pending";

date.value="";

}

function display(data){

let tbody=document.getElementById("tbody");

tbody.innerHTML="";

data.forEach((t,index)=>{

let pclass="priority-low";

if(t.priority=="High") pclass="priority-high";

if(t.priority=="Medium") pclass="priority-medium";

let sclass="status-pending";

if(t.status=="Completed") sclass="status-completed";

if(t.status=="In Progress") sclass="status-progress";

tbody.innerHTML+=`

<tr>

<td>${t.task}</td>

<td class="${pclass}">${t.priority}</td>

<td class="${sclass}">${t.status}</td>

<td>${t.date}</td>

<td>

<button class="edit" onclick="editTask(${index})">Edit</button>

<button class="delete" onclick="deleteTask(${index})">Delete</button>

</td>

</tr>

`;

});

progress();

}

function editTask(i){

let t=tasks[i];

task.value=t.task;

priority.value=t.priority;

status.value=t.status;

date.value=t.date;

editIndex=i;

}

function deleteTask(i){

if(confirm("Delete task?")){

tasks.splice(i,1);

saveStorage();

display(tasks);

}

}

function searchTask(text){

let d=tasks.filter(x=>x.task.toLowerCase().includes(text.toLowerCase()));

display(d);

}

function progress(){

let total=tasks.length;

let done=tasks.filter(x=>x.status=="Completed").length;

let percent=0;

if(total>0)

percent=Math.round(done/total*100);

let bar=document.getElementById("bar");

bar.style.width=percent+"%";

bar.innerHTML=percent+"%";

}

display(tasks);

</script>

</body>
</html>
